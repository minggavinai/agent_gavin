<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微觀戰爭：免疫防線 - 研究所生存競技</title>
    <style>
        html, body { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: #030000; overflow: hidden; 
            touch-action: none; position: fixed;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        canvas { display: block; }
        
        /* 頂部時間顯示 */
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-size: 24px; font-weight: 900; color: #00ffcc;
            text-shadow: 2px 2px 8px #000; pointer-events: none; z-index: 10;
        }

        /* 虛擬搖桿樣式 */
        #joystick-base {
            position: absolute; bottom: 60px; left: 60px;
            width: 100px; height: 100px; background: rgba(255, 255, 255, 0.08);
            border: 2px solid rgba(0, 255, 204, 0.4); border-radius: 50%;
            display: none; touch-action: none; z-index: 20;
        }
        #joystick-stick {
            position: absolute; top: 25px; left: 25px;
            width: 50px; height: 50px; background: rgba(0, 255, 204, 0.6);
            border-radius: 50%; touch-action: none;
        }

        /* 強化後的結算面板：解決重疊看不清的問題 */
        .overlay {
            display: none; 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            background: #000000; /* 使用純黑背景，徹底解決重疊問題 */
            padding: 35px 25px; 
            border: 4px solid #00ffcc; 
            border-radius: 24px; 
            text-align: center; 
            z-index: 100; 
            width: 85%; 
            max-width: 320px; 
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        h2 { color: #00ffcc; margin: 0 0 15px 0; font-size: 28px; font-weight: 900; }
        p { color: #888; margin: 5px 0; font-size: 16px; }

        /* 數字顯示：增加黑影描邊強化可視度 */
        .time-display { 
            font-size: 64px; 
            color: #ffcc00; 
            font-weight: 900; 
            display: block; 
            margin: 15px 0;
            text-shadow: 4px 4px 0px #000;
        }

        #bestTime {
            color: #00ffcc;
            font-weight: 900;
            background: rgba(0, 255, 204, 0.15);
            padding: 4px 12px;
            border-radius: 6px;
        }

        /* 按鈕樣式優化 */
        .menu-btn {
            display: block; width: 100%; margin: 15px 0; padding: 18px;
            background: #1a1a1a; color: #ffffff; border: 2px solid #444;
            border-radius: 14px; cursor: pointer; font-size: 18px; 
            font-weight: 800; text-transform: uppercase;
        }
        .menu-btn:hover { background: #00ffcc; color: #000; border-color: #fff; }
        
        .share-btn { background: #25D366; border: none; margin-top: 25px; color: white; }
    </style>
</head>
<body>

    <div id="ui">⏳ 生存時間: <span id="timeDisplay">0.0</span>s</div>
    
    <div id="joystick-base">
        <div id="joystick-stick"></div>
    </div>

    <div id="gameOverPanel" class="overlay">
        <h2>💀 系統崩潰</h2>
        <p>本次堅持時間</p>
        <span id="finalTime" class="time-display">0.0</span>
        <p>歷史最強抗體: <span id="bestTime">0.0</span>s</p>
        <button class="menu-btn" onclick="location.reload()">重新啟動實驗</button>
        <button class="menu-btn share-btn" onclick="shareToWhatsApp()">📢 分享到 WhatsApp</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const timeEl = document.getElementById('timeDisplay');
const joyBase = document.getElementById('joystick-base');
const joyStick = document.getElementById('joystick-stick');

function resize() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    if (window.innerWidth < 1000) joyBase.style.display = 'block'; 
}
window.addEventListener('resize', resize);
resize();

const assets = { player: new Image(), enemy: new Image(), bullet: new Image(), bg: new Image() };
assets.player.src = 'assets/player.png';
assets.enemy.src = 'assets/enemy.png';
assets.bullet.src = 'assets/bullet.png';
assets.bg.src = 'assets/background.png';

let isPaused = false;
let startTime = Date.now();
let survivedTime = 0;
let keys = {};
let player = { x: canvas.width/2, y: canvas.height/2, r: 23, speed: 5.8 };
let enemies = [];
let bullets = [];
let shootProb = 0.055;

// --- 🕹️ 虛擬搖桿邏輯 ---
let stickData = { x: 0, y: 0, active: false };
const maxLen = 40;

canvas.addEventListener('touchstart', handleTouch);
canvas.addEventListener('touchmove', handleTouch);
canvas.addEventListener('touchend', () => {
    stickData = { x: 0, y: 0, active: false };
    joyStick.style.transform = `translate(0px, 0px)`;
});

function handleTouch(e) {
    if (isPaused) return;
    const touch = e.touches[0];
    const rect = joyBase.getBoundingClientRect();
    const centerX = rect.left + rect.width / 2;
    const centerY = rect.top + rect.height / 2;
    
    let dx = touch.clientX - centerX;
    let dy = touch.clientY - centerY;
    let dist = Math.hypot(dx, dy);

    if (dist < 120 || stickData.active) {
        stickData.active = true;
        let angle = Math.atan2(dy, dx);
        let moveLen = Math.min(dist, maxLen);
        stickData.x = Math.cos(angle) * (moveLen / maxLen);
        stickData.y = Math.sin(angle) * (moveLen / maxLen);
        joyStick.style.transform = `translate(${stickData.x * maxLen}px, ${stickData.y * maxLen}px)`;
    }
}

// --- 遊戲核心邏輯 ---
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function handleGameOver() {
    isPaused = true;
    let savedBest = localStorage.getItem('bctech_best_time') || 0;
    if (parseFloat(survivedTime) > parseFloat(savedBest)) {
        localStorage.setItem('bctech_best_time', survivedTime);
        savedBest = survivedTime;
    }
    document.getElementById('finalTime').innerText = survivedTime;
    document.getElementById('bestTime').innerText = savedBest;
    document.getElementById('gameOverPanel').style.display = 'block';
    joyBase.style.display = 'none';
}

function shareToWhatsApp() {
    const text = `我在 AGENT GAVIN 研究所的《免疫防線》堅持了 ${survivedTime} 秒！🦠\n你能打破 60 秒大關嗎？\n挑戰連結：${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function spawnEnemy() {
    if (isPaused) return;
    let baseSpeed = 1.4 + (survivedTime / 18); // 難度隨時間增加
    enemies.push({
        x: Math.random() < 0.5 ? -40 : canvas.width + 40,
        y: Math.random() * canvas.height,
        r: 21, speed: baseSpeed
    });
}

function update() {
    if (isPaused) return;
    survivedTime = ((Date.now() - startTime) / 1000).toFixed(1);
    timeEl.innerText = survivedTime;

    // 移動邏輯
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    if (stickData.active) {
        player.x += stickData.x * player.speed;
        player.y += stickData.y * player.speed;
    }

    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    // 自動射擊最近敵人
    if (enemies.length > 0 && Math.random() < shootProb) {
        let nearest = enemies[0], minDist = Math.hypot(nearest.x - player.x, nearest.y - player.y);
        enemies.forEach(e => { let d = Math.hypot(e.x - player.x, e.y - player.y); if (d < minDist) { minDist = d; nearest = e; } });
        let angle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*13, vy: Math.sin(angle)*13 });
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < -60 || b.x > canvas.width + 60 || b.y < -60 || b.y > canvas.height + 60) bullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed; e.y += Math.sin(angle) * e.speed;
        bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.r + 12) { enemies.splice(i, 1); bullets.splice(bi, 1); }
        });
        if (Math.hypot(e.x - player.x, e.y - player.y) < player.r + e.r - 10) handleGameOver();
    });
}

function draw() {
    if (isPaused) return;
    ctx.fillStyle = "#030000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (assets.bg.complete) { ctx.globalAlpha = 0.25; ctx.drawImage(assets.bg, 0, 0, canvas.width, canvas.height); ctx.globalAlpha = 1.0; }
    ctx.drawImage(assets.player, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    enemies.forEach(e => ctx.drawImage(assets.enemy, e.x - e.r, e.y - e.r, e.r*2, e.r*2));
    bullets.forEach(b => ctx.drawImage(assets.bullet, b.x - 12, b.y - 12, 24, 24));
    update();
    requestAnimationFrame(draw);
}

function gameLoop() {
    spawnEnemy();
    let nextSpawn = Math.max(120, 1000 * Math.pow(0.88, survivedTime / 5)); // 指數級增加難度
    setTimeout(gameLoop, nextSpawn);
}
gameLoop();
draw();
</script>
</body>
</html>
