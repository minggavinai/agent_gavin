<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微觀戰爭：免疫防線 - 競技版</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: 'Segoe UI', Arial, sans-serif; }
        canvas { display: block; }
        
        /* UI 層 */
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 5px #000; pointer-events: none; z-index: 10; }
        
        /* 彈窗通用樣式 */
        .overlay {
            display: none; position: absolute; top: 50%; left: 50%; 
            transform: translate(-50%, -50%); background: rgba(20, 0, 0, 0.95);
            padding: 30px; border: 3px solid #ff4444; border-radius: 20px; 
            text-align: center; z-index: 100; width: 320px;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
        }

        .menu-btn {
            display: block; width: 100%; margin: 12px 0; padding: 15px;
            background: #333; color: white; border: 1px solid #555;
            border-radius: 10px; cursor: pointer; font-size: 18px; transition: 0.2s;
            text-decoration: none;
        }
        .menu-btn:hover { background: #ff4444; transform: scale(1.05); }
        .share-btn { background: #25D366; border: none; } /* WhatsApp 綠色 */
        
        h2 { color: #ff4444; margin: 0 0 15px 0; }
        .score-val { color: #ffdd00; font-size: 28px; display: block; margin: 10px 0; }
    </style>
</head>
<body>

    <div id="ui">免疫力評分: <span id="score">0</span></div>
    
    <div id="upgradeMenu" class="overlay">
        <h2>🧬 系統進化</h2>
        <p>選擇一項增益：</p>
        <button class="menu-btn" onclick="applyUpgrade('fireRate')">🔥 火力提升</button>
        <button class="menu-btn" onclick="applyUpgrade('speed')">⚡ 細胞加速</button>
        <button class="menu-btn" onclick="applyUpgrade('size')">🤏 體型縮小</button>
    </div>

    <div id="gameOverPanel" class="overlay">
        <h2>💀 免疫崩潰</h2>
        <p>本次得分</p>
        <span id="finalScore" class="score-val">0</span>
        <p>歷史最高紀錄</p>
        <span id="bestScore" class="score-val" style="font-size: 20px;">0</span>
        <button class="menu-btn" onclick="location.reload()">重新挑戰</button>
        <button class="menu-btn share-btn" onclick="shareToWhatsApp()">📢 分享戰績到 WhatsApp</button>
    </div>

    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 資源
const imgPlayer = new Image(); imgPlayer.src = 'assets/player.png';
const imgEnemy = new Image(); imgEnemy.src = 'assets/enemy.png';
const imgBullet = new Image(); imgBullet.src = 'assets/bullet.png';
const imgBg = new Image(); imgBg.src = 'assets/background.jpg';

// 狀態
let isPaused = false;
let score = 0;
let nextUpgradeScore = 100; 
let shootProb = 0.03;
let keys = {};
let player = { x: canvas.width/2, y: canvas.height/2, r: 25, speed: 5 };
let enemies = [];
let bullets = [];

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function applyUpgrade(type) {
    if (type === 'fireRate') shootProb += 0.02;
    if (type === 'speed') player.speed += 1.5;
    if (type === 'size') player.r = Math.max(10, player.r - 3);
    isPaused = false;
    document.getElementById('upgradeMenu').style.display = 'none';
    nextUpgradeScore += 100; 
    requestAnimationFrame(draw); 
}

function handleGameOver() {
    isPaused = true;
    let savedBest = localStorage.getItem('bctech_best_score') || 0;
    if (score > savedBest) {
        localStorage.setItem('bctech_best_score', score);
        savedBest = score;
    }
    document.getElementById('finalScore').innerText = score;
    document.getElementById('bestScore').innerText = savedBest;
    document.getElementById('gameOverPanel').style.display = 'block';
}

function shareToWhatsApp() {
    const text = `我在 BCTECH 的《免疫防線》拿到了 ${score} 分！你能超越我的紀錄嗎？🦠\n立即挑戰：${window.location.href}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}

function spawnEnemy() {
    if (isPaused) return;
    enemies.push({ 
        x: Math.random() < 0.5 ? -20 : canvas.width + 20, 
        y: Math.random() * canvas.height, 
        r: 20, 
        speed: 1.3 + (score / 1500) 
    });
}

function update() {
    if (isPaused) return;

    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    player.x = Math.max(player.r, Math.min(canvas.width - player.r, player.x));
    player.y = Math.max(player.r, Math.min(canvas.height - player.r, player.y));

    if (enemies.length > 0 && Math.random() < shootProb) {
        let angle = Math.atan2(enemies[0].y - player.y, enemies[0].x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10 });
    }

    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
    });

    enemies.forEach((e, i) => {
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed; e.y += Math.sin(angle) * e.speed;

        bullets.forEach((b, bi) => {
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.r) {
                enemies.splice(i, 1); bullets.splice(bi, 1);
                score += 10; scoreEl.innerText = score;
            }
        });

        if (Math.hypot(e.x - player.x, e.y - player.y) < player.r) handleGameOver();
    });

    if (score >= nextUpgradeScore) {
        isPaused = true;
        document.getElementById('upgradeMenu').style.display = 'block';
    }
}

function draw() {
    if (isPaused) return;
    ctx.fillStyle = "#200"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    if (imgBg.complete) ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);
    ctx.drawImage(imgPlayer, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    enemies.forEach(e => ctx.drawImage(imgEnemy, e.x - e.r, e.y - e.r, e.r*2, e.r*2));
    bullets.forEach(b => ctx.drawImage(imgBullet, b.x - 10, b.y - 10, 20, 20));
    update();
    requestAnimationFrame(draw);
}

setInterval(spawnEnemy, 1000);
draw();
</script>
</body>
</html>
