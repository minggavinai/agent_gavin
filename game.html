<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI 遊戲研究所 - AGENT GAVIN AI 研究所</title>
    <style>
        :root { --primary: #00ffcc; --bg: #000; --card: #0a0a0a; --text-muted: #888; }
        body { background: var(--bg); color: #fff; margin: 0; font-family: 'Segoe UI', system-ui, sans-serif; overflow-x: hidden; }

        /* 導航欄 */
        nav { 
            background: rgba(0,0,0,0.95); padding: 18px 8%; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 1000; 
            backdrop-filter: blur(20px); 
        }
        .logo { font-size: 20px; font-weight: 900; color: var(--primary); text-decoration: none; }
        .btn-back { color: #666; text-decoration: none; font-size: 14px; transition: 0.3s; font-weight: bold; }
        .btn-back:hover { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* 標題區 */
        header { padding: 100px 8% 60px; text-align: center; background: radial-gradient(circle at center, #111 0%, #000 80%); }
        header h1 { font-size: 3rem; margin: 0; font-weight: 900; letter-spacing: -1px; background: linear-gradient(45deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        header p { color: #888; max-width: 700px; margin: 25px auto; font-size: 1.1rem; line-height: 1.8; }

        /* 遊戲網格布局 */
        .game-grid { max-width: 1200px; margin: 0 auto; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; }
        
        .game-card { 
            background: var(--card); border-radius: 30px; overflow: hidden; 
            border: 1px solid #1a1a1a; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none; color: inherit; position: relative;
        }
        .game-card:hover { 
            transform: translateY(-15px); border-color: var(--primary); 
            box-shadow: 0 20px 50px rgba(0,255,204,0.15); 
        }
        
        .img-wrapper { width: 100%; height: 210px; overflow: hidden; background: #000; }
        .img-wrapper img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .game-card:hover img { opacity: 1; scale: 1.1; }

        .game-info { padding: 30px; text-align: center; }
        .game-info h3 { margin: 0 0 12px; font-size: 24px; font-weight: 800; color: #fff; }
        .game-info p { color: var(--text-muted); font-size: 15px; margin-bottom: 20px; }
        
        .btn-play { 
            display: inline-block; padding: 10px 25px; background: transparent; 
            color: var(--primary); border: 1px solid var(--primary); 
            border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        .game-card:hover .btn-play { background: var(--primary); color: #000; }

        /* 狀態標籤 */
        .status-tag { position: absolute; top: 20px; right: 20px; padding: 5px 12px; border-radius: 10px; font-size: 12px; font-weight: bold; z-index: 2; }
        .status-live { background: #00ffcc; color: #000; }
        .status-dev { background: #555; color: #fff; }

        footer { padding: 80px 8% 50px; text-align: center; border-top: 1px solid #111; }
        .copyright { color: #333; font-size: 12px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; }
        
        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .game-grid { gap: 25px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">AGENT GAVIN AI 研究所</a>
        <a href="index.html" class="btn-back">返回首頁</a>
    </nav>

    <header>
        <h1>AI 遊戲研究所</h1>
        <p>在這裡，我們測試互動性的極限。每一款遊戲都是一次關於 AI、代碼與玩家神經反應的深度實驗。</p>
    </header>

    <div class="game-grid">
        
        <a href="game_micro_war.html" class="game-card">
            <span class="status-tag status-live">已上線</span>
            <div class="img-wrapper">
                <img src="assets/ai_micro_war_cover.png" alt="免疫防線">
            </div>
            <div class="game-info">
                <h3>🦠 免疫防線</h3>
                <p>在微觀世界中突圍，挑戰 60 秒生存極限。研究所核心測試項目。</p>
                <div class="btn-play">立即啟動</div>
            </div>
        </a>

        <div class="game-card" style="cursor: default;">
            <span class="status-tag status-dev">開發中</span>
            <div class="img-wrapper">
                <img src="https://image.pollinations.ai/prompt/cyberpunk_space_station_warfare_top_view_neon_cyan_accents_black_background?width=512&height=320&nologo=true" alt="太空守護者">
            </div>
            <div class="game-info">
                <h3>🚀 太空守護者</h3>
                <p>即將到來的星際防禦實驗。探索真空環境下的 AI 彈幕演算法。</p>
                <div class="btn-play" style="opacity: 0.5;">敬請期待</div>
            </div>
        </div>

    </div>

    <footer>
        <div class="copyright">
            &copy; 2026 BCTECH ASIA LIMITED. ALL RIGHTS RESERVED.
        </div>
    </footer>

</body>
</html>
