<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微觀戰爭：免疫防線 (修復版)</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; font-size: 24px; font-weight: bold; text-shadow: 2px 2px 5px #000; pointer-events: none; z-index: 10; }
    </style>
</head>
<body>
    <div id="ui">免疫力評分: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');

// 初始化畫布大小
function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// 載入資產
const imgPlayer = new Image(); imgPlayer.src = 'assets/player.png';
const imgEnemy = new Image(); imgEnemy.src = 'assets/enemy.png';
const imgBullet = new Image(); imgBullet.src = 'assets/bullet.png';
const imgBg = new Image(); imgBg.src = 'assets/background.jpg';

let player = { x: canvas.width/2, y: canvas.height/2, r: 25, speed: 5 };
let enemies = [];
let bullets = [];
let score = 0;
let keys = {};

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

function spawnEnemy() {
    if (enemies.length < 20) { // 限制敵人數量防止卡頓
        const r = 20;
        let x = Math.random() < 0.5 ? -r : canvas.width + r;
        let y = Math.random() * canvas.height;
        enemies.push({ x, y, r, speed: 1.2 + (score / 1000) });
    }
}

function update() {
    // 移動玩家
    if (keys['ArrowUp'] || keys['w']) player.y -= player.speed;
    if (keys['ArrowDown'] || keys['s']) player.y += player.speed;
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;

    // 自動射擊 (降低頻率，提升手感)
    if (enemies.length > 0 && Math.random() < 0.03) {
        let target = enemies[0];
        let angle = Math.atan2(target.y - player.y, target.x - player.x);
        bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10 });
    }

    // 更新子彈位置
    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.x += b.vx; b.y += b.vy;
        if (b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) {
            bullets.splice(i, 1);
        }
    }

    // 更新敵人位置與碰撞
    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed;
        e.y += Math.sin(angle) * e.speed;

        // 子彈擊中
        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (Math.hypot(e.x - b.x, e.y - b.y) < e.r) {
                enemies.splice(i, 1);
                bullets.splice(j, 1);
                score += 10;
                scoreEl.innerText = score;
                break;
            }
        }

        // 玩家被撞
        if (e && Math.hypot(e.x - player.x, e.y - player.y) < player.r) {
            alert("遊戲結束！最終得分: " + score);
            location.reload();
            return;
        }
    }
}

function draw() {
    // 1. 先徹底擦除舊畫面
    ctx.fillStyle = "#220000"; 
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // 2. 畫背景圖 (如果加載完成)
    if (imgBg.complete && imgBg.naturalWidth !== 0) {
        ctx.drawImage(imgBg, 0, 0, canvas.width, canvas.height);
    }

    // 3. 畫玩家、敵人、子彈
    ctx.drawImage(imgPlayer, player.x - player.r, player.y - player.r, player.r*2, player.r*2);
    enemies.forEach(e => ctx.drawImage(imgEnemy, e.x - e.r, e.y - e.r, e.r*2, e.r*2));
    bullets.forEach(b => ctx.drawImage(imgBullet, b.x - 10, b.y - 10, 20, 20));

    update();
    requestAnimationFrame(draw);
}

// 啟動遊戲
let spawnTimer = setInterval(spawnEnemy, 1000);
draw();
</script>
</body>
</html>
